<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .Title }}{{ .Title }} · {{ end }}{{ .Site.Title }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ if .IsPage }}{{ .Summary | plainify | truncate 160 }}{{ else }}{{ .Site.Params.description }}{{ end }}{{ end }}">
<meta property="og:title" content="{{ if .Title }}{{ .Title }}{{ else }}{{ .Site.Title }}{{ end }}">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ if .IsPage }}{{ .Summary | plainify | truncate 160 }}{{ else }}{{ .Site.Params.description }}{{ end }}{{ end }}">
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:site_name" content="{{ .Site.Title }}">
<meta property="og:image" content="{{ "img/card.png" | absURL }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="{{ "img/card.png" | absURL }}">
<link rel="canonical" href="{{ .Permalink }}">
<link rel="stylesheet" href="{{ "css/lab-site.css" | relURL }}">
</head><body>
<header class="site">
<a class="brand" href="/">{{ .Site.Title }}</a>
<nav><a href="/">Home</a>{{ range .Site.Sections }}<a href="{{ .RelPermalink }}">{{ .Title }}</a>{{ end }}
<a href="https://github.com/joanmarcriera/lab-site">Lab repo</a></nav>
</header>
<main>{{ block "main" . }}{{ end }}</main>
<footer>AI-assisted content, my real face and words. Site + pipeline:
<a href="https://github.com/joanmarcriera/lab-site">lab-site</a>.</footer>
</body></html>
