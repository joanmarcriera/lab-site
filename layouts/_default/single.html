{{ define "main" }}<article><h1>{{ .Title }}</h1>
<p class="meta">{{ with .Params.series }}<span class="series">{{ . }}</span> &nbsp; {{ end }}{{ range (.GetTerms "tags") }}<a class="series" href="{{ .RelPermalink }}">{{ .LinkTitle }}</a> &nbsp; {{ end }}</p>
{{ with .Params.youtube }}<div class="videowrap"><iframe src="https://www.youtube-nocookie.com/embed/{{ . }}" frameborder="0" allowfullscreen></iframe></div>{{ end }}
{{ .Content }}
{{ with .Params.repo_folder }}<p class="artefacts">📁 Artefacts: <a href="https://github.com/joanmarcriera/local-ai-lab/tree/main/{{ . }}">{{ . }}</a></p>{{ end }}
</article>{{ end }}
